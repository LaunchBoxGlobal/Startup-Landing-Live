    <style>
      :root {
        --brand-red: #f40e00;
      }
      body {
        background-color: #fafafa;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      /* Background Grid */
      .bg-grid {
        background-size: 60px 60px;
        background-image:
          linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        animation: gridMove 30s linear infinite;
      }
      @keyframes gridMove {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 60px 60px;
        }
      }

      /* Glassmorphism */
      .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.04),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      /* Dashboard Image */
      .dashboard-image {
        will-change: transform, opacity;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.06),
          0 2px 8px rgba(0, 0, 0, 0.02);
      }

      /* Graph Animation */
      .graph-path {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
      }

      /* Rocket Particles */
      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: var(--brand-red);
        border-radius: 50%;
        opacity: 0;
      }

      /* Ambient Glow */
      .ambient-glow {
        background: radial-gradient(
          circle at 50% 50%,
          rgba(244, 14, 0, 0.06),
          transparent 60%
        );
      }

      .sequence-element {
        will-change: transform, opacity;
      }
    </style>

    <script>
      const tl = gsap.timeline({ repeat: -1, duration: 8 });

      // 0.0 - 2.0: Timeline Animation
      tl.fromTo(
        ".timeline-line-active",
        { strokeDashoffset: 1000 },
        { strokeDashoffset: 0, duration: 2, ease: "power2.inOut" },
        0,
      );

      tl.fromTo(
        ".timeline-step .step-node",
        { scale: 0.8, borderColor: "#D1D5DB" },
        { scale: 1, borderColor: "#F40E00", duration: 0.4, stagger: 0.3 },
        0.2,
      );

      tl.fromTo(
        ".timeline-step span",
        { color: "#9CA3AF" },
        { color: "#111827", duration: 0.4, stagger: 0.3 },
        0.2,
      );

      // 1.0 - 2.5: Funding Cards
      tl.fromTo(
        ".funding-card",
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.6, stagger: 0.3, ease: "power2.out" },
        1.0,
      );

      // 2.0 - 2.8: Dashboard Reveal
      tl.fromTo(
        ".dashboard-image",
        { opacity: 0, y: 20, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.8, ease: "power2.out" },
        2.0,
      );

      // 2.0 - 3.5: Team Panel & Lines
      tl.fromTo(
        ".team-panel",
        { opacity: 0, x: 20 },
        { opacity: 1, x: 0, duration: 0.8 },
        2.0,
      );

      tl.fromTo(
        ".team-icon",
        { opacity: 0, scale: 0.8 },
        { opacity: 1, scale: 1, duration: 0.4, stagger: 0.2 },
        2.2,
      );

      tl.fromTo(
        ".connection-line",
        { strokeDashoffset: 300, opacity: 0 },
        {
          strokeDashoffset: 0,
          opacity: 0.4,
          duration: 1,
          ease: "power2.inOut",
        },
        2.5,
      );

      // 3.0 - 4.5: Product Screens
      tl.fromTo(
        ".product-screen",
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.6, stagger: 0.15, ease: "power3.out" },
        3.0,
      );

      tl.fromTo(
        ".graph-path",
        { strokeDashoffset: 300 },
        { strokeDashoffset: 0, duration: 1.5, ease: "power2.inOut" },
        3.5,
      );

      // 6.5 - 8.0: Seamless Fade Out to reset
      tl.to(
        ".timeline-step .step-node",
        { borderColor: "#D1D5DB", duration: 0.5 },
        6.5,
      );
      tl.to(".timeline-step span", { color: "#9CA3AF", duration: 0.5 }, 6.5);
      tl.to(
        ".timeline-line-active",
        { strokeDashoffset: 1000, duration: 1 },
        6.5,
      );

      tl.to(
        ".funding-card, .team-panel, .product-screen, .dashboard-image",
        {
          opacity: 0,
          y: -10,
          duration: 1.2,
          stagger: 0.1,
          ease: "power2.in",
        },
        6.8,
      );

      tl.to(".connection-line", { opacity: 0, duration: 0.8 }, 6.8);

      // Continuous Animations (independent of timeline loop)

      // Dashboard Image Float
      gsap.to(".dashboard-image", {
        y: -3,
        duration: 5,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut",
      });

      // Rocket Float
      gsap.to(".rocket-container", {
        y: -6,
        duration: 2.5,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut",
      });

      // Rocket Particles
      gsap.to(".particle", {
        y: 15,
        opacity: 0,
        duration: 1.2,
        stagger: 0.4,
        repeat: -1,
        ease: "power1.out",
      });

      // Background Dots Movement
      gsap.utils.toArray(".dot").forEach((dot, i) => {
        gsap.to(dot, {
          x: `random(-50, 50)`,
          y: `random(-50, 50)`,
          duration: `random(8, 15)`,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
          delay: i * 2,
        });
      });

      // Micro hover movement for team icons
      gsap.utils.toArray(".team-icon").forEach((icon, i) => {
        gsap.to(icon, {
          y: -3,
          duration: 2,
          yoyo: true,
          repeat: -1,
          ease: "sine.inOut",
          delay: i * 0.5,
        });
      });

      // Subtle floating for product screens
